name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npx wxt build

      - name: Zip extension
        run: npx wxt zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimi-web-assistant-chrome
          path: .output/kimi-web-assistant-*.zip

      - name: Upload unpacked extension
        uses: actions/upload-artifact@v4
        with:
          name: kimi-web-assistant-chrome-unpacked
          path: .output/chrome-mv3/
